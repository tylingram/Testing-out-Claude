name: Test App

# Run this workflow on every push and pull request to main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Check out the code from the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install dependencies from requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Run the app in headless mode to verify it imports and runs without errors
      - name: Run app check
        run: python -c "import app"
